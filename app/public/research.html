<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#100f09" />
  <title>投研助手 — Robindex</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav">
    <a class="brand" href="/"><span class="mark">R</span><span class="bt"><b>Robindex</b><span>MARKET INTELLIGENCE</span></span></a>
    <nav class="nav-links"></nav>
    <div class="nav-right"></div>
  </header>

  <div class="app" id="app">
    <!-- left sidebar (desktop only) -->
    <aside class="side">
      <div class="side-head"><b>投研助手</b><button class="nav-icon" id="hideHistory" aria-label="收起历史对话">⇤</button></div>
      <button class="side-btn" id="newChat">＋ 新对话</button>
      <button class="side-btn search">🔍 搜索对话 <span class="kbd">⌘K</span></button>
      <div class="conv-list" id="convList"></div>
      <div class="side-foot">
        <button class="side-btn">⚙ 设置</button>
      </div>
    </aside>

    <!-- center -->
    <section class="main">
      <div class="tab-bar" id="tabBar">
        <button class="tab active" data-tab="chat">对话</button>
        <button class="tab" data-tab="workspace">工作区</button>
      </div>
      <div class="thread" id="thread">
        <div class="empty" id="empty">
          <img class="ava" id="pAva" alt="" />
          <div class="pname" id="pName">@Serenity</div>
          <p class="pdesc" id="pDesc"></p>
          <div class="switcher">
            <button class="switch-pill" id="switchPill"><img id="switchAva" alt="" /><span id="switchName">@aleabitoreddit</span> ▾</button>
            <span class="switch-note">用这个切换分析框架</span>
          </div>
          <div class="prompt-cards" id="promptCards">
            <button class="pcard emerald" data-mode="stock"><span class="pic">⚖</span><span class="pt">他怎么看这只股票</span><span class="pmeta">输入代码 ▾</span></button>
            <button class="pcard amber" data-mode="market"><span class="pic">◴</span><span class="pt">他怎么看最近的市场</span><span class="pmeta amber">4 问题 ▾</span></button>
            <button class="pcard sky" data-mode="sector"><span class="pic">⛓</span><span class="pt">他怎么看这个行业</span><span class="pmeta blue">选主题 ▾</span></button>
            <button class="pcard rose" data-mode="verify"><span class="pic">▤</span><span class="pt">验证他的观点</span><span class="pmeta red">快速问 ▾</span></button>
          </div>
          <div class="prompt-detail" id="promptDetail" hidden></div>
        </div>
      </div>

      <!-- workspace panel -->
      <div class="workspace" id="workspace" hidden>
        <div class="ws-section">
          <div class="ws-head"><span class="ws-label">原文支持</span><span class="ws-count" id="wsSrcCount">0 条推文</span></div>
          <div class="ws-list" id="wsSrcList"></div>
        </div>
        <div class="ws-section">
          <div class="ws-head"><span class="ws-label">工具调用</span></div>
          <div class="ws-list" id="wsToolList"></div>
        </div>
        <div class="ws-section">
          <div class="ws-head"><span class="ws-label">实时行情</span></div>
          <div class="ws-list" id="wsMarketList"></div>
        </div>
      </div>

      <div class="composer-wrap">
        <div class="composer-inner">
          <div class="agent-bar">
            <span class="agent-tag" id="agentTag">● @aleabitoreddit 博主 Agent</span>
            <span class="agent-lock">🔒 Ultra 无限使用</span>
            <a class="agent-unlock" href="/pricing">解锁 Ultra ↗</a>
          </div>
          <form class="composer" id="composer">
            <textarea id="input" rows="1" placeholder="按 @Serenity 方法论提问…" aria-label="提问"></textarea>
            <button class="send" id="send" type="submit" aria-label="发送">↑</button>
          </form>
          <div class="remaining" id="remaining">今日剩余 2 次</div>
        </div>
      </div>
    </section>

    <!-- right source panel (toggled) -->
    <aside class="srcpanel" id="srcpanel" hidden>
      <div class="srcpanel-head">
        <div><div class="st">原文支持</div><div class="sc" id="srcCount">0 条博主历史推文</div></div>
        <button class="x" id="srcClose" aria-label="关闭">✕</button>
      </div>
      <div class="src-list" id="srcList"></div>
    </aside>
  </div>

  <script src="/nav.js"></script>
  <script src="/research.js"></script>
</body>
</html>
